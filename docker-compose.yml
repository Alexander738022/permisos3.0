version: '3.8'

services:
  # Servidor PHP para tu sistema permisos3.0
  web:
    build: .
    container_name: permisos_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db

  # Servidor de Base de Datos MySQL 8.0
  db:
       image: mysql:8.0
       container_name: permisos_db
       restart: always
       environment:
         MYSQL_ROOT_PASSWORD: root_password_segura
         MYSQL_DATABASE: proyecto # <-- Aquí Docker creará automáticamente la base de datos "proyecto"
       ports:
         - "3306:3306"
       volumes:
         - db_data:/var/lib/mysql

  # Administrador gráfico de Base de Datos (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: permisos_phpmyadmin
    restart: always
    ports:
      - "80:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password_segura

volumes:
  db_data: