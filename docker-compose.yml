version: '3.8'

services:
  # Servidor PHP para tu sistema web
  web:
    build: .
    container_name: permisos_web
    restart: unless-stopped
    ports:
      - "80:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.permisos-web.rule=Host(`alex-geremy.byronrm.com`)"
      - "traefik.http.routers.permisos-web.entrypoints=web"
    depends_on:
      - db

  # Servidor de Base de Datos MySQL 8.0
  db:
    image: mysql:8.0
    container_name: permisos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segura
      MYSQL_DATABASE: proyecto
    volumes:
      - db_data:/var/lib/mysql

  # Administrador gráfico de Base de Datos (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: permisos_phpmyadmin
    restart: always
    ports:
      - "8082:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.permisos-pma.rule=Host(`alex-jona.byronrm.com`)"
      - "traefik.http.routers.permisos-pma.entrypoints=web"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password_segura
    depends_on:
      - db

volumes:
  db_data: